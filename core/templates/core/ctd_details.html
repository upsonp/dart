{% extends "base.html" %}

{% block extra_style %}
    {{ block.super }}
    <style>
        .vertical-scrollbar {
            position: relative;
            height: 400px;
            overflow: auto;
        }

        .horizontal-scrollbar {
            position: relative;
            overflow: auto;
        }

        .table-wrapper-scroll-y {
            display: block;
        }

        .table-wrapper-scroll-y thead {
            position: sticky;
            top: 0px;
            background: white;
        }

        .table-wrapper-scroll-x {
            display: block;
        }

        .table-wrapper-scroll-x tbody th:first-child {
            position: sticky;
            left: 0px;
            background: white;
            border-bottom-color: black;
            border-bottom-width: 0.25em;
        }

        .selectedBg {
            background: #8fd19e !important;
        }

    </style>
{% endblock %}

{% block title %}
    {{ block.super }}
    <span class="col-3">
        <a class="btn btn-primary" href="{% url 'core:event_details' object.id %}">Events</a>
        <a class="btn btn-primary" href="{% url 'core:sample_details' object.id %}">Samples</a>
    </span>
{% endblock %}

{% block content %}
    <div id="app" class="row mt-2">
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            CTD
                            <span v-if="loading_ctd" class="loading">
                                <span class="spinner-border" style="width: 1rem; height: 1rem;" role="status">
                                    <span class="sr-only"></span>
                                </span>
                            </span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-wrapper-scroll-y vertical-scrollbar table-wrapper-scroll-x horizontal-scrollbar">
                            <table class="table table-striped table-hover table-sm sortable">
                                <thead>
                                <tr>
                                    <th>Sample</th>
                                    <template v-for="h in ctd.headers"><th>${ h.header }</th></template>
                                </tr>
                                </thead>
                                <tbody class="">
                                    <tr v-for="(bottle, index) in ctd.bottles">
                                        <th>${ bottle }</th>
                                        <template v-for="h in ctd.headers"><td>${ h.data[index] }</td></template>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col mt-2">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <span>
                                <div class="row">
                                    <span class="col-2">
                                        <label for="file_dir">CTD Directory</label>
                                    </span>
                                    <span class="col">
                                    <span v-if="loading_files" class="loading">
                                        <span class="spinner-border" style="width: 1rem; height: 1rem;" role="status">
                                            <span class="sr-only"></span>
                                        </span>
                                    </span>
                                    </span>
                                </div>
                                <div id="file_dir" class="h3">${ file_dir }</div>
                            </span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="load_all" class="row">
                            <span class="col-2">
                            <button class="btn btn-primary col-12 m-1" v-on:click="load_file()">All</button>
                            </span>
                            <span class="col-2">
                            <button class="btn btn-secondary col-12 m-1" v-on:click="load_file(-1)">Unprocessed</button>
                            </span>
                        </div>
                        <div class="row">
                            <span class="col-2" v-for="(f, index) in files" :key="f.fid">
                                <button v-on:click="load_file(index)" class="btn col-12 m-1"
                                        :class="[f.loading==false ? (f.bg ? f.bg : (f.processed==true ? 'btn-primary' : 'btn-secondary')) : 'btn-warning']">
                                    <span v-if="f.loading==true" class="loading">
                                        <span class="spinner-border" style="width: 1rem; height: 1rem;" role="status">
                                            <span class="sr-only"></span>
                                        </span>
                                    </span>
                                    <span>
                                    ${ f.file_name }
                                    </span>
                                </button>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block body_js %}
    <script>
    var app = new Vue({
        el: '#app',
        delimiters: ["${", "}"],
        data: {
            ctd: [],
            ctd_dir: null,
            loading: false,
            loading_ctd: false,
            loading_files: false,
            file_dir: "",
            files: [],
            processing: [],
            to_process: []
        },
        mounted: function() {
            this.load_ctd();
            this.get_files();
        },
        methods: {
            get_files() {
                let endpoint = "{% url 'core:load_files' %}?file_type=btl&mission_id={{ object.id }}";

                this.loading_files = true;
                apiService(endpoint, "GET").then(response => {
                    this.loading_files = false;
                    if(response !== undefined) {
                        app.file_dir = response['dir'];
                        if(response['files']) {
                            app.files = response['files'];
                            for(let i=0; i<app.files.length; i++){
                                app.files[i].loading = false;
                            }
                        }
                    }
                });
            },
            load_file(index) {
                if(index == null) {
                    for(let i=0; i<app.files.length; i++) {
                        this.load_file(i);
                    }
                    return;
                } else if(index === -1) {
                    let filted_files = app.files.filter(function(f) {
                        return !f.processed;
                    });
                    for(let i=0; i<filted_files.length; i++) {
                        this.load_file(app.files.indexOf(filted_files[i]))
                    }
                    return;
                }

                if(this.processing.length >= 2){
                    this.to_process.push(index);
                    app.files[index].bg = 'btn-light';
                    this.$forceUpdate();
                    return;
                }

                this.processing.push(index);

                let endpoint = "{% url 'core:process_ctd' %}?mission_id={{ object.id }}";
                app.files[index].loading = true;

                endpoint = endpoint + "&fid=" + app.files[index].fid;

                this.$forceUpdate();
                apiService(endpoint, "POST").then(response => {
                    app.files[index].loading = false;
                    this.$forceUpdate();
                    if(response!==undefined) {
                        if(response['errors'] && response['errors'].length > 0) {
                            app.files[index].bg = "btn-warning";
                            msg = "Errors\n\n"
                            for(let i=0; i<response['errors'].length; i++) {
                                err = response['errors'][i];
                                msg += err.msg + ": " + err.trace + "\n\n";
                            }
                            window.alert(msg);
                        } else {
                            app.files[index].bg = "btn-success";
                        }
                        this.load_ctd();
                    } else {
                        app.files[index].bg = "btn-danger";
                    }

                    this.processing.shift();

                    if(this.to_process.length > 0) {
                        let next = this.to_process.shift();
                        this.load_file(next);
                    }
                });
            },
            load_ctd() {
                let endpoint = "{% url 'core-api:ctd-report-list' %}?mission_id={{ object.id }}";
                this.loading_ctd = true;
                apiService(endpoint, "GET").then(response => {
                    this.loading_ctd = false;
                    if (response !== undefined) {
                        app.ctd = response[0];
                    }
                });
            }
        }
    });

    </script>
{% endblock %}
