<table class="table table-striped table-hover table-sm sortable">
    <thead>
    <tr>
        <th>Bottle ID</th>
        <th>Pressure</th>
        <th>Sample Date</th>
        <th>Calculated Salinity</th>
        <th>Comments</th>
    </tr>
    </thead>
    <tbody>
    <tr v-for="sample in filtered.salt">
        <td>${ sample.Sample }</td>
        <td>${ sample.Pressure }</td>
        <td>${ sample.Sample_Date }</td>
        <td>${ sample.Calculated }</td>
        <td>${ sample.Comments }</td>
    </tr>
    </tbody>
</table>
